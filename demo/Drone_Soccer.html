<html lang="zh-TW">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>四軸無人機操作教學 v0.23 (真實機身與尾燈)</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* 阻止預設滑動 */
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* UI 介面設計 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            pointer-events: auto;
            margin: 15px;
        }
        .top-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .status-box {
            max-width: 320px;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #333; }
        
        /* 遊戲資訊樣式 */
        .game-info {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            background: #eee;
            padding: 8px 10px;
            border-radius: 8px;
            text-align: center;
        }
        .timer { font-size: 1.4rem; color: #d35400; margin-bottom: 5px; }
        .msg { color: #2ecc71; font-size: 1rem; }

        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .btn:active:not(:disabled) { background: #2980b9; }
        .btn-success { background: #2ecc71; }
        
        .instructions {
            font-size: 0.8rem;
            color: #444;
            margin-top: 10px;
            line-height: 1.4;
        }

        /* 虛擬搖桿區塊 */
        .joystick-container {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            margin-bottom: 80px; 
        }
        .joystick-zone {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            position: relative;
            pointer-events: auto;
            touch-action: none;
        }
        .joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(52, 152, 219, 0.8);
            border-radius: 50%;
            position: absolute;
            top: 50px;
            left: 50px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .joystick-label {
            position: absolute;
            top: -35px;
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            font-size: 0.9rem;
        }
        
        /* 手機版響應式縮小介面 */
        @media (max-width: 600px) {
            .panel { padding: 8px; margin: 8px; }
            h2 { font-size: 1rem; margin-bottom: 5px; }
            .btn { padding: 6px; font-size: 0.85rem; margin-bottom: 5px; }
            .instructions { font-size: 0.7rem; margin-top: 5px; }
            .joystick-container { padding: 10px 20px; margin-bottom: 70px; } 
            .joystick-zone { width: 100px; height: 100px; }
            .joystick-knob { width: 40px; height: 40px; top: 30px; left: 30px; }
            .joystick-label { font-size: 0.75rem; top: -25px; }
        }

    </style>
    <!-- 載入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="top-ui">
            <div class="panel status-box">
                <div style="display:flex; justify-content:space-between; align-items:center; width: 100%;">
                    <h2 id="panel-title">無人機足球練習</h2>
                    <button id="btn-toggle-ui" style="background:none;border:none;font-size:1.2rem;cursor:pointer;padding:0;line-height:1;">➖</button>
                </div>
                
                <div class="game-info">
                    <div class="timer">倒數計時: <span id="timer-val">03:00</span></div>
                    <div class="msg" id="game-msg">請先完成起飛準備</div>
                </div>

                <!-- 將按鈕與安裝區塊包進可收合的區域 -->
                <div id="collapsible-area">
                    <!-- 常駐操作按鈕區 -->
                    <div id="action-buttons" style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px;">
                        <button id="btn-tilt" class="btn" style="flex: 1 1 45%; background:#f39c12; margin-bottom: 0;">📱 體感</button>
                        <button id="btn-goalie" class="btn" style="flex: 1 1 45%; background:#e67e22; margin-bottom: 0;">🤖 開守門員</button>
                        <button id="btn-view" class="btn" style="display:none; flex: 1 1 45%; background:#9b59b6; margin-bottom: 0;">切換: 近距跟隨</button>
                        <button id="btn-reset" class="btn" style="display:none; flex: 1 1 45%; background:#c0392b; margin-bottom: 0;">🔄 重置場地</button>
                    </div>
                    
                    <div id="setup-group">
                        <div id="status-text" style="color: #e74c3c; font-weight: bold; margin-bottom: 10px; margin-top: 10px;">狀態: 未就緒</div>
                        <button id="btn-prop" class="btn">1. 安裝螺旋槳</button>
                        <button id="btn-batt" class="btn">2. 安裝電池</button>
                        
                        <div class="instructions">
                            💡 <b>操作方式：</b><br>
                            [左搖桿] 或 <b>W/S</b>：油門升降<br>
                            [左搖桿] 或 <b>A/D</b>：偏航左右轉<br>
                            [右搖桿] / <b>方向鍵</b> / <b>手機傾斜</b>：水平平移<br>
                            🎯 <b>注意：發亮紅燈是尾巴，藍條是前方！</b><br>
                            🏆 目標：從前方穿過懸浮圓環得分！
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="joystick-container">
            <div id="joy-left" class="joystick-zone">
                <div class="joystick-label">油門/偏航<br>(W A S D)</div>
                <div id="knob-left" class="joystick-knob"></div>
            </div>
            <div id="joy-right" class="joystick-zone">
                <div class="joystick-label">俯仰/滾轉<br>(方向鍵)</div>
                <div id="knob-right" class="joystick-knob"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 遊戲狀態與變數 ---
        let hasProps = false;
        let hasBattery = false;
        let isReady = false;
        let score = 0;
        let timeLeft = 180; 
        let canScore = true;
        let viewMode = 0; // 0: 150cm定點視角, 1: 第三人稱近距
        let cameraZoom = 1.0; 
        let lastTime = Date.now();
        let trailPts = []; 

        const joyInputs = { throttle: 0, yaw: 0, pitch: 0, roll: 0 };
        const kbdInputs = { throttle: 0, yaw: 0, pitch: 0, roll: 0 };
        const tiltInputs = { pitch: 0, roll: 0 };
        let tiltEnabled = false;
        let baseBeta = null;
        let baseGamma = null;
        const flightInputs = { throttle: 0, yaw: 0, pitch: 0, roll: 0 };

        // --- Three.js 基礎設定 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.01);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- 光源 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 100;
        dirLight.shadow.camera.bottom = -100;
        dirLight.shadow.camera.left = -100;
        dirLight.shadow.camera.right = 100;
        scene.add(dirLight);

        // --- 練習場地 ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x2e7d32 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        function createLine(w, h, x, z) {
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(x, 0.005, z);
            scene.add(mesh);
        }

        createLine(4, 0.02, 0, -3); 
        createLine(4, 0.02, 0, 3);  
        createLine(0.02, 6, -2, 0); 
        createLine(0.02, 6, 2, 0);  
        createLine(4, 0.02, 0, 0);
        
        const circleGeo = new THREE.RingGeometry(0.5, 0.52, 32);
        const circleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
        const centerCircle = new THREE.Mesh(circleGeo, circleMat);
        centerCircle.rotation.x = -Math.PI / 2;
        centerCircle.position.y = 0.005;
        scene.add(centerCircle);

        createLine(4, 0.02, 0, 1.5); 
        
        const trailMat = new THREE.PointsMaterial({ color: 0xffff00, size: 0.05, transparent: true, opacity: 0.7 });
        const trailGeo = new THREE.BufferGeometry();
        const trailPoints = new THREE.Points(trailGeo, trailMat);
        scene.add(trailPoints);

        // --- 懸浮球門與分數板 ---
        const goalGroup = new THREE.Group();
        const ringGeo = new THREE.TorusGeometry(0.35, 0.05, 16, 50);
        const ringMat = new THREE.MeshLambertMaterial({ color: 0xff3333, emissive: 0xff3333, emissiveIntensity: 0.5 });
        const hoopRing = new THREE.Mesh(ringGeo, ringMat);
        hoopRing.position.y = 1.2; 
        goalGroup.add(hoopRing);
        
        goalGroup.position.set(0, 0, -2.5); 
        scene.add(goalGroup);

        const hoopRadius = 0.35;
        const hoopZ = -2.5; 

        const scoreCanvas = document.createElement('canvas');
        scoreCanvas.width = 256; scoreCanvas.height = 256;
        const scoreCtx = scoreCanvas.getContext('2d');
        const scoreTex = new THREE.CanvasTexture(scoreCanvas);
        const scoreSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: scoreTex, color: 0xffffff }));
        scoreSprite.position.set(0, 1.8, -2.5); 
        scoreSprite.scale.set(0.8, 0.8, 1);
        scene.add(scoreSprite);

        function updateScoreDisplay() {
            scoreCtx.clearRect(0,0,256,256);
            scoreCtx.fillStyle = '#ffffff';
            scoreCtx.font = 'bold 160px "Segoe UI", Arial';
            scoreCtx.textAlign = 'center';
            scoreCtx.textBaseline = 'middle';
            scoreCtx.shadowColor = "rgba(0,0,0,0.8)";
            scoreCtx.shadowBlur = 10;
            scoreCtx.fillText(score.toString(), 128, 128);
            scoreTex.needsUpdate = true;
        }
        updateScoreDisplay(); 

        // --- 模擬守門員 (保留紫色的球形防撞籠) ---
        let goalieEnabled = false;
        const goalies = [];
        const GOALIE_RADIUS = 0.12;
        
        function createGoalie(xStart) {
            const gGroup = new THREE.Group();
            const cage = new THREE.Mesh(new THREE.IcosahedronGeometry(GOALIE_RADIUS, 2), new THREE.MeshLambertMaterial({color: 0x8e44ad, wireframe: true}));
            const core = new THREE.Mesh(new THREE.SphereGeometry(0.04, 16, 16), new THREE.MeshLambertMaterial({color: 0x333333}));
            gGroup.add(cage);
            gGroup.add(core);
            gGroup.position.set(xStart, 1.2, -2.3);
            gGroup.visible = false;
            scene.add(gGroup);
            goalies.push(gGroup);
        }
        createGoalie(-0.2); 
        createGoalie(0.2);  

        // --- 建立無人機模型 (拔掉防撞罩，改為經典 X 型機身) ---
        const drone = new THREE.Group();
        const DRONE_HIT_RADIUS = 0.12; // 雖然沒有球罩，但保留碰撞體積(含螺旋槳範圍)
        drone.position.set(0, 0.02, 2.25); // 移除罩子後，起落架高度變低
        scene.add(drone);

        // 1. 核心機身 (深灰色方塊)
        const bodyGeo = new THREE.BoxGeometry(0.06, 0.025, 0.10);
        const bodyMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
        const coreBody = new THREE.Mesh(bodyGeo, bodyMat);
        coreBody.position.y = 0.01;
        coreBody.castShadow = true;
        drone.add(coreBody);

        // 2. 交叉機臂 (X 型框架)
        const armGeo = new THREE.BoxGeometry(0.01, 0.01, 0.22);
        const armMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
        const arm1 = new THREE.Mesh(armGeo, armMat);
        arm1.rotation.y = Math.PI / 4;
        arm1.position.y = 0.01;
        arm1.castShadow = true;
        drone.add(arm1);

        const arm2 = new THREE.Mesh(armGeo, armMat);
        arm2.rotation.y = -Math.PI / 4;
        arm2.position.y = 0.01;
        arm2.castShadow = true;
        drone.add(arm2);

        // 3. 超亮紅色尾燈 (在後方 +Z 方向)
        const tailGeo = new THREE.SphereGeometry(0.015, 8, 8);
        const tailMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const tailLight = new THREE.Mesh(tailGeo, tailMat);
        tailLight.position.set(0, 0.015, 0.055);
        drone.add(tailLight);

        // 4. 機頭藍色指示 (在前方 -Z 方向)
        const frontGeo = new THREE.BoxGeometry(0.04, 0.01, 0.02);
        const frontMat = new THREE.MeshLambertMaterial({ color: 0x3498db });
        const front = new THREE.Mesh(frontGeo, frontMat);
        front.position.set(0, 0.015, -0.055);
        drone.add(front);

        // 5. 螺旋槳與馬達配置 (放置在機臂末端)
        const propOffset = 0.077; // 配合機臂長度 (0.22 / 2 * sin(45))
        const propsData = [
            { x: -propOffset, z: -propOffset, dir: 1 },
            { x: propOffset,  z: -propOffset, dir: -1 },
            { x: -propOffset, z: propOffset,  dir: -1 },
            { x: propOffset,  z: propOffset,  dir: 1 }
        ];
        
        propsData.forEach(p => {
            // 馬達座
            const motorGeo = new THREE.CylinderGeometry(0.012, 0.012, 0.025);
            const motorMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const motor = new THREE.Mesh(motorGeo, motorMat);
            motor.position.set(p.x, 0.01, p.z);
            motor.castShadow = true;
            drone.add(motor);

            // 螺旋槳 (稍微加大，增加真實感)
            const propGroup = new THREE.Group();
            const bladeGeo = new THREE.BoxGeometry(0.1, 0.002, 0.01);
            const bladeMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.castShadow = true;
            propGroup.add(blade);

            propGroup.position.set(p.x, 0.025, p.z);
            propGroup.visible = false;
            drone.add(propGroup);
            p.mesh = propGroup; 
        });

        // --- UI 互動邏輯 ---
        const btnProp = document.getElementById('btn-prop');
        const btnBatt = document.getElementById('btn-batt');
        const btnTilt = document.getElementById('btn-tilt');
        const btnView = document.getElementById('btn-view');
        const btnGoalie = document.getElementById('btn-goalie');
        const btnReset = document.getElementById('btn-reset');
        const statusText = document.getElementById('status-text');
        const gameMsg = document.getElementById('game-msg');
        const setupGroup = document.getElementById('setup-group');
        const btnToggleUI = document.getElementById('btn-toggle-ui');
        const collapsibleArea = document.getElementById('collapsible-area');
        const panelTitle = document.getElementById('panel-title');

        // 修改 UI 收合邏輯，現在會連同操作按鈕和標題一起隱藏
        btnToggleUI.addEventListener('click', () => {
            if (collapsibleArea.style.display === 'none') {
                collapsibleArea.style.display = 'block';
                panelTitle.style.display = 'block';
                btnToggleUI.innerText = '➖';
            } else {
                collapsibleArea.style.display = 'none';
                panelTitle.style.display = 'none';
                btnToggleUI.innerText = '➕';
            }
        });

        btnTilt.addEventListener('click', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') enableTilt();
                        else alert('需要同意感測器權限才能使用體感控制');
                    }).catch(console.error);
            } else {
                enableTilt();
            }
        });

        function enableTilt() {
            if (!tiltEnabled) {
                tiltEnabled = true;
                window.addEventListener('deviceorientation', handleOrientation);
            }
            baseBeta = null;
            baseGamma = null;
            btnTilt.innerText = '📱 體感已開(校正)';
            btnTilt.style.background = '#27ae60';
        }

        function handleOrientation(event) {
            if (!tiltEnabled) return;
            let beta = event.beta;   
            let gamma = event.gamma; 

            if (baseBeta === null || baseGamma === null) {
                baseBeta = beta;
                baseGamma = gamma;
            }

            const maxAngle = 25; 
            let dPitch = (beta - baseBeta) / maxAngle;
            let dRoll = (gamma - baseGamma) / maxAngle;

            tiltInputs.pitch = Math.max(-1, Math.min(1, dPitch));
            tiltInputs.roll = Math.max(-1, Math.min(1, dRoll));
        }

        btnGoalie.addEventListener('click', () => {
            goalieEnabled = !goalieEnabled;
            goalies.forEach(g => g.visible = goalieEnabled);
            if (goalieEnabled) {
                btnGoalie.innerText = '🤖 關守門員';
                btnGoalie.style.background = '#c0392b';
            } else {
                btnGoalie.innerText = '🤖 開守門員';
                btnGoalie.style.background = '#e67e22';
            }
        });

        btnReset.addEventListener('click', () => {
            drone.position.set(0, 0.02, 2.25);
            drone.rotation.set(0, 0, 0);
            flightInputs.throttle = 0;
            flightInputs.yaw = 0;
            flightInputs.pitch = 0;
            flightInputs.roll = 0;
            
            score = 0;
            updateScoreDisplay();
            timeLeft = 180;
            document.getElementById('timer-val').innerText = '03:00';
            canScore = true;
            trailPts = [];
            trailGeo.setFromPoints(trailPts);
            
            isReady = true; 
            lastTime = Date.now();
            gameMsg.innerText = '場地已重置！請越過中線進攻';
            gameMsg.style.color = '#2ecc71';
        });

        btnProp.addEventListener('click', () => {
            hasProps = true;
            btnProp.className = 'btn btn-success';
            btnProp.innerText = '1. 螺旋槳已安裝 ✓';
            btnProp.disabled = true;
            propsData.forEach(p => p.mesh.visible = true);
            checkReady();
        });

        btnBatt.addEventListener('click', () => {
            hasBattery = true;
            btnBatt.className = 'btn btn-success';
            btnBatt.innerText = '2. 電池已安裝 ✓';
            btnBatt.disabled = true;
            checkReady();
        });

        function checkReady() {
            if (hasProps && hasBattery) {
                isReady = true;
                statusText.innerText = '狀態: 準備起飛！';
                statusText.style.color = '#2ecc71';
                gameMsg.innerText = '準備出發！請越過中線進攻';
                gameMsg.style.color = '#2ecc71';
                
                btnView.style.display = 'block';
                btnReset.style.display = 'block';
                
                lastTime = Date.now(); 

                // 起飛後自動把多餘介面折疊起來，釋放手機畫面空間
                setTimeout(() => {
                    setupGroup.style.display = 'none';
                    collapsibleArea.style.display = 'none';
                    panelTitle.style.display = 'none';
                    btnToggleUI.innerText = '➕';
                }, 1500);
            }
        }

        btnView.addEventListener('click', () => {
            viewMode = viewMode === 0 ? 1 : 0;
            if (viewMode === 1) {
                btnView.innerText = '切換: 150cm定點';
                btnView.style.background = '#e67e22';
            } else {
                btnView.innerText = '切換: 近距跟隨';
                btnView.style.background = '#9b59b6';
            }
        });

        // --- 鍵盤與搖桿控制 ---
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': kbdInputs.throttle = 1; break;
                case 's': kbdInputs.throttle = -1; break;
                case 'a': kbdInputs.yaw = -1; break;
                case 'd': kbdInputs.yaw = 1; break;
                case 'arrowup': kbdInputs.pitch = 1; e.preventDefault(); break;
                case 'arrowdown': kbdInputs.pitch = -1; e.preventDefault(); break;
                case 'arrowleft': kbdInputs.roll = -1; e.preventDefault(); break;
                case 'arrowright': kbdInputs.roll = 1; e.preventDefault(); break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': if(kbdInputs.throttle===1) kbdInputs.throttle = 0; break;
                case 's': if(kbdInputs.throttle===-1) kbdInputs.throttle = 0; break;
                case 'a': if(kbdInputs.yaw===-1) kbdInputs.yaw = 0; break;
                case 'd': if(kbdInputs.yaw===1) kbdInputs.yaw = 0; break;
                case 'arrowup': if(kbdInputs.pitch===1) kbdInputs.pitch = 0; break;
                case 'arrowdown': if(kbdInputs.pitch===-1) kbdInputs.pitch = 0; break;
                case 'arrowleft': if(kbdInputs.roll===-1) kbdInputs.roll = 0; break;
                case 'arrowright': if(kbdInputs.roll===1) kbdInputs.roll = 0; break;
            }
        });

        function setupJoystick(zoneId, knobId, axisX, axisY, isLeft) {
            const zone = document.getElementById(zoneId);
            const knob = document.getElementById(knobId);
            const maxRadius = 50;
            let active = false;
            let center = { x: 0, y: 0 };

            function start(e) {
                active = true;
                const rect = zone.getBoundingClientRect();
                center = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                move(e);
            }

            function move(e) {
                if (!active) return;
                let clientX = e.clientX, clientY = e.clientY;
                if(e.touches && e.touches.length > 0) {
                    for(let i=0; i<e.touches.length; i++) {
                        let t = e.touches[i], r = zone.getBoundingClientRect();
                        if(t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom) {
                            clientX = t.clientX; clientY = t.clientY; break;
                        }
                    }
                }

                let dx = clientX - center.x;
                let dy = clientY - center.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > maxRadius) { dx = (dx / dist) * maxRadius; dy = (dy / dist) * maxRadius; }

                knob.style.transform = `translate(${dx}px, ${dy}px)`;
                
                joyInputs[axisX] = dx / maxRadius;
                joyInputs[axisY] = -dy / maxRadius; 
            }

            function end() {
                active = false;
                joyInputs[axisX] = 0;
                if (!isLeft) joyInputs[axisY] = 0;
                else joyInputs.throttle = 0; 
                knob.style.transform = `translate(0px, 0px)`;
            }

            zone.addEventListener('pointerdown', start);
            window.addEventListener('pointermove', move);
            window.addEventListener('pointerup', end);
        }

        setupJoystick('joy-left', 'knob-left', 'yaw', 'throttle', true);
        setupJoystick('joy-right', 'knob-right', 'roll', 'pitch', false);

        // --- 視角縮放邏輯 (僅在近距跟隨模式有效) ---
        window.addEventListener('wheel', (e) => {
            if(viewMode === 1) {
                cameraZoom += e.deltaY * 0.002;
                cameraZoom = Math.max(0.3, Math.min(cameraZoom, 3.0));
            }
        });

        let initialPinchDistance = null;
        container.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2 && viewMode === 1) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                initialPinchDistance = Math.sqrt(dx * dx + dy * dy);
            }
        });
        container.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && viewMode === 1 && initialPinchDistance) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                cameraZoom += (initialPinchDistance - dist) * 0.01;
                cameraZoom = Math.max(0.3, Math.min(cameraZoom, 3.0));
                initialPinchDistance = dist;
            }
        });
        container.addEventListener('touchend', (e) => { if (e.touches.length < 2) initialPinchDistance = null; });

        // --- 動畫與物理更新迴圈 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (isReady) {
                const prevX = drone.position.x;
                const prevY = drone.position.y;
                const prevZ = drone.position.z;

                const targetThrottle = Math.max(-1, Math.min(1, kbdInputs.throttle + joyInputs.throttle));
                const targetYaw = Math.max(-1, Math.min(1, kbdInputs.yaw + joyInputs.yaw));
                const targetPitch = Math.max(-1, Math.min(1, kbdInputs.pitch + joyInputs.pitch + tiltInputs.pitch));
                const targetRoll = Math.max(-1, Math.min(1, kbdInputs.roll + joyInputs.roll + tiltInputs.roll));

                flightInputs.throttle += (targetThrottle - flightInputs.throttle) * 5 * dt;
                flightInputs.yaw += (targetYaw - flightInputs.yaw) * 10 * dt;
                flightInputs.pitch += (targetPitch - flightInputs.pitch) * 8 * dt;
                flightInputs.roll += (targetRoll - flightInputs.roll) * 8 * dt;

                const baseSpeed = 15 + Math.max(0, flightInputs.throttle) * 20;
                
                propsData.forEach(p => {
                    let pitchEffect = p.z * flightInputs.pitch * 12;
                    let rollEffect = -p.x * flightInputs.roll * 12;
                    let yawEffect = -p.dir * flightInputs.yaw * 15;
                    if (p.mesh) p.mesh.rotation.y += (baseSpeed + pitchEffect + rollEffect + yawEffect) * p.dir * dt;
                });

                drone.rotation.y -= flightInputs.yaw * 3.0 * dt;
                const moveSpeed = 3.0; 
                drone.translateZ(-flightInputs.pitch * moveSpeed * dt);
                drone.translateX(flightInputs.roll * moveSpeed * dt);
                const liftSpeed = 2.0; 
                drone.position.y += flightInputs.throttle * liftSpeed * dt;

                drone.rotation.x = 0;
                drone.rotation.z = 0;

                // 邊界限制 (拔掉防撞罩後，高度下限改回 0.02 以貼近地面)
                if (drone.position.x < -2.0) drone.position.x = -2.0;
                if (drone.position.x > 2.0) drone.position.x = 2.0;
                if (drone.position.z < -3.0) drone.position.z = -3.0;
                if (drone.position.z > 3.0) drone.position.z = 3.0;
                if (drone.position.y > 3.0) drone.position.y = 3.0;
                if (drone.position.y < 0.02) drone.position.y = 0.02; 

                if (timeLeft > 0) {
                    let now = Date.now();
                    if (now - lastTime >= 1000) {
                        timeLeft--;
                        lastTime = now;
                        let m = Math.floor(timeLeft / 60);
                        let s = timeLeft % 60;
                        document.getElementById('timer-val').innerText = `0${m}:${s.toString().padStart(2, '0')}`;
                        
                        if (timeLeft <= 0) {
                            gameMsg.innerText = "時間到！請點擊重置場地。";
                            gameMsg.style.color = "#e74c3c";
                            isReady = false; 
                        }
                    }
                }

                if (drone.position.y > 0.05) { 
                    trailPts.push(drone.position.clone());
                    if (trailPts.length > 40) trailPts.shift();
                    trailGeo.setFromPoints(trailPts);
                }

                if (goalieEnabled) {
                    const time = Date.now() * 0.001;
                    goalies[0].position.x = Math.sin(time * 2) * 0.4;
                    const targetX = Math.max(-0.4, Math.min(0.4, drone.position.x));
                    goalies[1].position.x += (targetX - goalies[1].position.x) * 0.5 * dt;

                    goalies.forEach(g => {
                        g.children[0].rotation.x += 5 * dt;
                        g.children[0].rotation.y += 5 * dt;
                        // 球體碰撞距離 (攻擊機 0.12 虛擬半徑 + 守門員 0.12 半徑)
                        if (drone.position.distanceTo(g.position) < (DRONE_HIT_RADIUS + GOALIE_RADIUS)) {
                            drone.position.z += 0.3; 
                            drone.position.y -= 0.05; 
                        }
                    });
                }

                if (canScore) {
                    if (prevZ > hoopZ && drone.position.z <= hoopZ) {
                        let t = (hoopZ - prevZ) / (drone.position.z - prevZ);
                        let crossX = prevX + t * (drone.position.x - prevX);
                        let crossY = prevY + t * (drone.position.y - prevY);
                        let distToCenter = Math.sqrt(crossX*crossX + (crossY-1.2)*(crossY-1.2));

                        if (distToCenter <= hoopRadius) {
                            score++;
                            updateScoreDisplay(); 
                            canScore = false; 
                            
                            hoopRing.material.emissiveIntensity = 1.0;
                            document.body.style.backgroundColor = '#ffcccc';
                            setTimeout(() => {
                                hoopRing.material.emissiveIntensity = 0.5;
                                document.body.style.backgroundColor = '#87CEEB';
                            }, 200);

                            gameMsg.innerText = "⚽ 進球！請退回中線！";
                            gameMsg.style.color = "#e74c3c";
                        }
                    } 
                    else if (prevZ < hoopZ && drone.position.z >= hoopZ) {
                        let t = (hoopZ - prevZ) / (drone.position.z - prevZ);
                        let crossX = prevX + t * (drone.position.x - prevX);
                        let crossY = prevY + t * (drone.position.y - prevY);
                        let distToCenter = Math.sqrt(crossX*crossX + (crossY-1.2)*(crossY-1.2));

                        if (distToCenter <= hoopRadius) {
                            gameMsg.innerText = "❌ 無效！從後方穿過不算分";
                            gameMsg.style.color = "#e74c3c";
                        }
                    }
                } else {
                    if (drone.position.z > 0) {
                        canScore = true; 
                        gameMsg.innerText = "✅ 已回中線，可以進攻！";
                        gameMsg.style.color = "#2ecc71";
                    }
                }
            } 

            // --- 視角切換邏輯 ---
            if (viewMode === 0) {
                // 150cm 定點視角：攝影機固定在起點後方的高空(高度1.5m)，並且注視無人機
                camera.position.set(0, 1.5, 3.5);
                camera.lookAt(drone.position);
            } else {
                // 第三人稱近距視角：鏡頭緊跟無人機，透過 cameraZoom 可以用滾輪再微調
                const relativeCameraOffset = new THREE.Vector3(0, cameraZoom * 0.25, cameraZoom * 0.6);
                const cameraOffset = relativeCameraOffset.applyMatrix4(drone.matrixWorld);
                camera.position.lerp(cameraOffset, 0.1);
                camera.lookAt(drone.position);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
