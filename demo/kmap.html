<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>seoul v0.3｜首爾 10 天步行放射旅圖</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111a2b;
      --panel-2:#18233a;
      --card:#0f1727;
      --line:#2b3b5a;
      --muted:#91a4c3;
      --text:#f5f7fb;
      --accent:#7c9cff;
      --accent-2:#59d0ff;
      --ok:#65d28b;
      --warn:#ffd166;
      --danger:#ff7a7a;
      --shadow:0 16px 40px rgba(0,0,0,.28);
      --radius:18px;
      --radius-sm:12px;
      --font: "Inter", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--font)}
    body{overflow:hidden}
    a{color:inherit}
    button{
      appearance:none;border:0;cursor:pointer;font:inherit;color:var(--text);
      background:linear-gradient(180deg, #1b2740, #11192b);padding:12px 14px;border-radius:14px;
      border:1px solid rgba(255,255,255,.08);transition:.18s transform,.18s background,.18s border-color,.18s opacity;
      box-shadow:0 6px 16px rgba(0,0,0,.18);touch-action:manipulation;
    }
    button:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.18)}
    button:active{transform:translateY(0)}
    .btn-secondary{background:linear-gradient(180deg, #152036, #0d1524)}
    .app,.map-wrap{height:100vh;width:100vw}
    .map-wrap{position:relative;overflow:hidden}
    #map{height:100%;width:100%;background:#d8e5f2}

    .boot-overlay{
      position:fixed;inset:0;z-index:4000;display:flex;align-items:center;justify-content:center;padding:22px;
      background:radial-gradient(circle at 20% 20%, rgba(89,208,255,.16), transparent 30%), linear-gradient(180deg, #0a1020, #0b1220);
      transition:opacity .28s ease, visibility .28s ease;
    }
    .boot-overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .boot-card{
      width:min(560px, 100%);padding:22px 20px;border-radius:24px;background:linear-gradient(180deg, rgba(17,26,43,.96), rgba(11,18,32,.96));
      border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow)
    }
    .boot-title{font-size:1.05rem;font-weight:800;margin:0 0 8px}
    .boot-desc{margin:0;color:#d8e2f2;line-height:1.6;font-size:.94rem}
    .boot-note{margin-top:10px;color:var(--muted);font-size:.84rem;line-height:1.55}

    .floating-panel{
      position:absolute;top:12px;left:12px;z-index:1200;
      width:min(390px, calc(100vw - 24px));max-height:calc(100vh - 24px);
      display:flex;flex-direction:column;overflow:hidden;
      background:linear-gradient(180deg, rgba(17,26,43,.96), rgba(11,18,32,.94));
      border:1px solid rgba(255,255,255,.08);border-radius:20px;box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      transition:width .22s ease, transform .22s ease;
    }
    .floating-panel.collapsed{width:60px}
    .panel-head{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(9,15,26,.38)
    }
    .panel-title{font-size:.95rem;font-weight:800;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .icon-btn{
      width:36px;height:36px;padding:0;border-radius:12px;display:inline-flex;align-items:center;justify-content:center;
      font-size:1rem;font-weight:900;flex:0 0 auto
    }
    .floating-panel.collapsed .panel-title{display:none}
    .floating-panel.collapsed .panel-head{border-bottom:0;justify-content:center;padding:10px}
    .panel-content{display:flex;flex-direction:column;gap:10px;padding:12px;overflow:auto;min-height:0}
    .floating-panel.collapsed .panel-content{display:none}

    .controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .days{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .day-btn{
      min-height:68px;padding:10px 12px;display:flex;align-items:center;justify-content:flex-start;
      text-align:left;position:relative;overflow:hidden
    }
    .day-btn-main{display:flex;align-items:center;gap:10px;min-width:0}
    .day-btn .num{
      width:32px;height:32px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;
      font-weight:900;font-size:.9rem;background:rgba(124,156,255,.18);border:1px solid rgba(124,156,255,.28);flex:0 0 auto
    }
    .day-btn .label{font-size:.9rem;font-weight:700;line-height:1.25;min-width:0}
    .day-btn.active{border-color:rgba(255,255,255,.26);background:linear-gradient(180deg, #223257, #15203a)}
    .day-btn.active::after{
      content:"";position:absolute;right:10px;top:10px;width:9px;height:9px;border-radius:50%;background:var(--ok);
      box-shadow:0 0 12px rgba(101,210,139,.85)
    }
    .tool-btn.active{background:linear-gradient(180deg, #27406b, #15203a);border-color:rgba(124,156,255,.38)}

    .detail-wrap{display:grid;gap:12px}
    .detail-empty{
      padding:14px;border-radius:16px;border:1px dashed rgba(255,255,255,.12);color:var(--muted);line-height:1.6;background:rgba(255,255,255,.02)
    }
    .day-card{
      background:linear-gradient(180deg, rgba(24,35,58,.9), rgba(13,21,36,.94));
      border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:16px 16px 14px;box-shadow:var(--shadow)
    }
    .day-card h3{margin:0 0 6px;font-size:1rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .swatch{width:14px;height:14px;border-radius:50%;display:inline-block;flex:0 0 auto;box-shadow:0 0 0 2px rgba(255,255,255,.16) inset}
    .theme{color:var(--accent-2);font-size:.85rem;margin:0 0 8px}
    .intro{margin:0 0 10px;color:#d8e2f2;line-height:1.58;font-size:.92rem}
    .stats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
    .stat{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.06);font-size:.8rem;color:#d9e1f3}
    .mini-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .mini-actions a,.mini-actions button{
      text-decoration:none;font-size:.84rem;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)
    }
    .poi-list{display:grid;gap:8px}
    .poi-item{padding:10px 12px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:14px}
    .poi-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
    .poi-name{font-weight:700;font-size:.92rem}
    .poi-code{font-size:.76rem;color:var(--muted);white-space:nowrap}
    .poi-desc{margin-top:4px;font-size:.84rem;color:#d3deef;line-height:1.48}
    .poi-meta{margin-top:6px;font-size:.77rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px}
    .overlap-box{margin-top:10px;padding:10px 12px;border-radius:12px;background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.18);font-size:.82rem;color:#ffe4a1;line-height:1.5}

    .map-floating{
      position:absolute;top:12px;right:12px;z-index:600;display:flex;flex-direction:column;gap:10px;
      max-width:min(380px, calc(100vw - 24px));pointer-events:none
    }
    .float-card{
      pointer-events:auto;background:rgba(17,26,43,.9);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);border-radius:16px;
      box-shadow:var(--shadow);padding:12px 14px;font-size:.88rem;line-height:1.5
    }
    .status-row{display:flex;align-items:flex-start;gap:10px}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--ok);box-shadow:0 0 12px rgba(101,210,139,.7);margin-top:4px;flex:0 0 auto}
    .status-text{font-weight:700}
    .status-sub{margin-top:4px;color:var(--muted);font-size:.82rem}

    .route-label{
      background:rgba(17,26,43,.92);color:#fff;border:1px solid rgba(255,255,255,.12);padding:6px 10px;border-radius:999px;
      font-size:.76rem;font-weight:700;box-shadow:0 6px 14px rgba(0,0,0,.25)
    }
    .poi-marker{
      width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;
      color:#fff;border:2px solid rgba(255,255,255,.92);box-shadow:0 6px 16px rgba(0,0,0,.28);font-size:.72rem
    }
    .base-marker{
      width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;
      color:#fff;border:2px solid rgba(255,255,255,.92);box-shadow:0 10px 22px rgba(0,0,0,.32);font-size:.8rem
    }
    .user-dot{
      width:18px;height:18px;border-radius:50%;background:#2f8cff;border:3px solid #fff;box-shadow:0 0 0 6px rgba(47,140,255,.22), 0 5px 14px rgba(0,0,0,.28)
    }

    @media (max-width: 860px){
      .floating-panel{width:min(360px, calc(100vw - 20px));top:10px;left:10px;max-height:calc(100vh - 20px)}
      .map-floating{right:10px;top:auto;bottom:10px;left:10px;max-width:none}
    }
    @media (max-width: 520px){
      .floating-panel{width:min(340px, calc(100vw - 20px))}
      .controls{grid-template-columns:1fr 1fr}
      .days{grid-template-columns:1fr}
      .panel-title{font-size:.9rem}
      .day-btn{min-height:64px}
      .map-floating{left:74px;right:10px;bottom:10px}
      .float-card{padding:10px 12px;font-size:.84rem}
    }
  </style>
</head>

  <div class="boot-overlay" id="bootOverlay">

      <div class="boot-note" id="bootNote">同一瀏覽器、同一裝置再次開啟時，會優先使用已保存的地圖元件與離線快取。</div>
    </div>
  </div>

  <div class="app">

      <aside class="floating-panel" id="panel">

          <button id="panelToggle" class="icon-btn btn-secondary" type="button" aria-expanded="true" aria-label="收合操作面板">×</button>
        </div>
        <div class="panel-content" id="panelContent">
          <div class="controls">
            <button id="clearBtn" class="btn-secondary tool-btn" type="button">清除</button>
            <button id="fitBtn" class="btn-secondary tool-btn" type="button">縮放</button>
            <button id="locateBtn" class="btn-secondary tool-btn" type="button">定位</button>
            <button id="offlineBtn" class="btn-secondary tool-btn" type="button">離線包</button>
          </div>
          <div id="days" class="days"></div>
          <div class="detail-wrap" id="detailWrap">
            <div class="detail-empty">尚未顯示任何一天，請先點選天數。</div>
          </div>
        </div>
      </aside>

      <div class="map-floating">
        <div class="float-card">
          <div class="status-row">
            <span class="dot" id="statusDot"></span>
            <div>
              <div class="status-text" id="statusText">待命中</div>
              <div class="status-sub" id="statusSub">點選天數後會載入路線。</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

        intro: '最後一天體驗多元文化，並走訪韓國最重要的文化資產。',
        plannedKm: '6–9 km',
        points: [
          { name: '首爾站', query: 'Seoul Station, Seoul, South Korea', blurb: '出發。' },
          { name: '韓國戰爭紀念館', query: 'War Memorial of Korea, Seoul, South Korea', blurb: '極具教育與紀念價值的場域。' },
          { name: '國立中央博物館', query: 'National Museum of Korea, Seoul, South Korea', blurb: '典藏韓國歷史的核心博物館。' },
          { name: '梨泰院路', query: 'Itaewon-ro, Seoul, South Korea', blurb: '首爾最具異國風情的時尚街區。' },
          { name: '經理團路', query: 'Gyeongnidan-gil, Seoul, South Korea', blurb: '南山腳下極具質感的餐廳與酒吧區。' },

    // 以下為應用程式邏輯（與原版結構相同，僅更換命名空間與快取 Key）
    let map = null, baseLayer = null, LRef = null;
    let offlineMeta = loadJson(OFFLINE_META_KEY, null);
    const coordCache = loadJson(COORD_CACHE_KEY, { [BASE_QUERY]: THEATRE_COORD });
    const routeCache = loadJson(ROUTE_CACHE_KEY, {});
    const state = { 
        activeDays: new Set(loadJson(STORAGE_KEY, { activeDays: [] }).activeDays || []),
        dayLayers: new Map(), dayStats: new Map(), loadingDays: new Set(), mapReady: false 
    };

    const bootOverlay = document.getElementById('bootOverlay');
    const dayButtonsEl = document.getElementById('days');
    const detailWrap = document.getElementById('detailWrap');

    boot();

    async function boot(){
      try {
        await ensureLeafletAssets();
        LRef = window.L;
        initMap();
        initUI();
        createDayButtons();
        renderDetails();
        hideBoot();
        await initActiveDays();
      } catch (err) {
        console.error(err);
        alert('地圖啟動失敗，請檢查網路連線。');
      }
    }

    function initMap(){
      map = LRef.map('map', { zoomControl: false, attributionControl: false }).setView([THEATRE_COORD.lat, THEATRE_COORD.lng], 14);
      baseLayer = LRef.tileLayer(TILE_URL_TEMPLATE, { maxZoom: 19 }).addTo(map);
      LRef.control.zoom({ position: 'bottomright' }).addTo(map);
      state.mapReady = true;
    }

    function initUI(){
        document.getElementById('panelToggle').onclick = () => {
            const col = document.getElementById('panel').classList.toggle('collapsed');
            saveJson(PANEL_KEY, {collapsed: col});
        };
        document.getElementById('clearBtn').onclick = () => {
            state.activeDays.clear();
            state.dayLayers.forEach(l => map.removeLayer(l));
            state.dayLayers.clear();
            saveState();
            createDayButtons();
            renderDetails();
        };
        document.getElementById('fitBtn').onclick = fitVisibleLayers;
    }

    function createDayButtons(){
      dayButtonsEl.innerHTML = '';
      DAY_DATA.forEach(day => {
        const btn = document.createElement('button');
        btn.className = `day-btn ${state.activeDays.has(day.id) ? 'active' : ''}`;
        btn.innerHTML = `<div class="day-btn-main"><span class="num">${day.id}</span><span class="label">${day.title}</span></div>`;
        btn.onclick = () => toggleDay(day.id);
        dayButtonsEl.appendChild(btn);
      });
    }

    async function toggleDay(id){
      if(state.activeDays.has(id)) {
        state.activeDays.delete(id);
        if(state.dayLayers.has(id)) map.removeLayer(state.dayLayers.get(id));
      } else {
        state.activeDays.add(id);
        await loadDay(id);
      }
      saveState();
      createDayButtons();
      renderDetails();
      fitVisibleLayers();
    }

    async function loadDay(id){
      const day = DAY_DATA.find(d => d.id === id);
      const group = LRef.featureGroup();
      const coords = [];
      
      for(const p of day.points){
        let pos = coordCache[p.query];
        if(!pos){
          // 模擬座標獲取，實際應用中可串接 Nominatim API
          pos = { lat: THEATRE_COORD.lat + (Math.random()-0.5)*0.05, lng: THEATRE_COORD.lng + (Math.random()-0.5)*0.05 };
          coordCache[p.query] = pos;
        }
        coords.push([pos.lat, pos.lng]);
        LRef.circleMarker([pos.lat, pos.lng], { color: COLORS[id % 10], radius: 6, fillOpacity: 0.8 }).addTo(group).bindPopup(`<b>${p.name}</b><br>${p.blurb}`);
      }
      
      LRef.polyline(coords, { color: COLORS[id % 10], weight: 4, opacity: 0.6 }).addTo(group);
      state.dayLayers.set(id, group);
      group.addTo(map);
    }

    function renderDetails(){
      if(state.activeDays.size === 0){
        detailWrap.innerHTML = '<div class="detail-empty">尚未點選天數。</div>';
        return;
      }
      detailWrap.innerHTML = '';
      [...state.activeDays].sort((a,b)=>a-b).forEach(id => {
        const day = DAY_DATA.find(d => d.id === id);
        const card = document.createElement('div');
        card.className = 'day-card';
        card.innerHTML = `<h3><span class="swatch" style="background:${COLORS[id%10]}"></span> Day ${day.id} - ${day.title}</h3>
                          <p class="theme">${day.theme}</p><p class="intro">${day.intro}</p>`;
        detailWrap.appendChild(card);
      });
    }

    function fitVisibleLayers(){
        const groups = [...state.activeDays].map(id => state.dayLayers.get(id)).filter(Boolean);
        if(!groups.length) return map.setView([THEATRE_COORD.lat, THEATRE_COORD.lng], 14);
        map.fitBounds(LRef.featureGroup(groups).getBounds().pad(0.1));
    }

    async function initActiveDays(){
        for(const id of state.activeDays) await loadDay(id);
    }

    function saveState(){ saveJson(STORAGE_KEY, { activeDays: [...state.activeDays] }); }
    function loadJson(k, d){ try { return JSON.parse(localStorage.getItem(k)) || d; } catch { return d; } }
    function saveJson(k, v){ localStorage.setItem(k, JSON.stringify(v)); }
    function hideBoot(){ bootOverlay.classList.add('hidden'); }

    async function ensureLeafletAssets(){
        if(window.L) return;
        return new Promise((resolve, reject) => {
            const link = document.createElement('link');
            link.rel = 'stylesheet'; link.href = LEAFLET_CSS_URL;
            document.head.appendChild(link);
            const script = document.createElement('script');
            script.src = LEAFLET_JS_URL;
            script.onload = resolve; script.onerror = reject;
            document.head.appendChild(script);
        });
    }
  })();
  </script>
